<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Notum Var</title>
    <style>
        body {
            /* Arka plan fotoğrafı tüm ekranı kaplasın */
            background-image: url('fotograf.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            transition: background 0.5s ease; /* Geçiş efekti */
        }

        /* Fotoğrafın üzerine hafif bir karartma ekleyerek butonun okunmasını sağlar */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2); /* Fotoğrafı %20 karartır */
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2; /* İçeriğin karartmanın üstünde durmasını sağlar */
            padding: 20px;
            width: 100%;
        }

        #gift-button {
            padding: 15px 35px;
            font-size: 20px;
            /* Bebek mavisi buton */
            background-color: #89CFF0; 
            /* Butondan iki ton daha koyu çerçeve */
            border: 3px solid #5DA9E1; 
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            font-weight: bold;
        }

        #gift-button:active {
            transform: scale(0.9);
        }

        #note {
            display: none;
            /* Tıklandığında arka plan bebek mavisi olacak */
            background-color: #89CFF0; 
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            line-height: 1.8;
            color: white; 
            max-width: 85%;
            margin: 0 auto;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <button id="gift-button" onclick="showNote()">Butona tıkla
